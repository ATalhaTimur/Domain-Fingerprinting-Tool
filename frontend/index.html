<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domain Fingerprinting Tool</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="graph.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: 0.02em;
    }

    header .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 12px;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
    }

    .toolbar {
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #21262d;
      flex-wrap: wrap;
    }

    .toolbar input {
      flex: 1;
      min-width: 240px;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .toolbar input:focus { border-color: #4a9eff; }
    .toolbar input::placeholder { color: #484f58; }

    .mode-toggle {
      display: flex;
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
    }

    .mode-toggle button {
      padding: 8px 16px;
      border: none;
      background: #161b22;
      color: #8b949e;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .mode-toggle button.active {
      background: #21262d;
      color: #f0f6fc;
    }

    .scan-btn {
      padding: 8px 20px;
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .scan-btn:hover:not(:disabled) { background: #2ea043; }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-bar {
      padding: 8px 24px;
      font-size: 0.8rem;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.scanning { background: #f39c12; animation: pulse 1s infinite; }
    .dot.done     { background: #2ecc71; }
    .dot.error    { background: #e74c3c; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .workspace {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #graph-container {
      flex: 1;
      position: relative;
      background: #0d1117;
      border-right: 1px solid #21262d;
      min-height: 420px;
    }

    #graph-container .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #484f58;
      font-size: 0.9rem;
      pointer-events: none;
    }

    #graph-container .empty-state svg {
      opacity: 0.2;
    }

    .side-panel {
      width: 280px;
      flex-shrink: 0;
      padding: 16px;
      overflow-y: auto;
      border-left: 1px solid #21262d;
      background: #0d1117;
      display: none;
    }

    .side-panel.visible { display: block; }

    .side-panel h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .node-id {
      font-size: 0.9rem;
      font-weight: 600;
      color: #f0f6fc;
      word-break: break-all;
      margin-bottom: 6px;
    }

    .node-type {
      display: inline-block;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      margin-bottom: 14px;
    }

    .meta-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }

    .meta-table td {
      padding: 5px 4px;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
    }

    .meta-table td:first-child {
      color: #8b949e;
      width: 40%;
      font-weight: 500;
    }

    .meta-table td:last-child { color: #c9d1d9; word-break: break-all; }

    .risk-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .risk-chip.critical { background: #3d1a1a; color: #e74c3c; border: 1px solid #e74c3c44; }
    .risk-chip.medium   { background: #3d2e0a; color: #f39c12; border: 1px solid #f39c1244; }
    .risk-chip.low      { background: #0d2a1a; color: #2ecc71; border: 1px solid #2ecc7144; }

    .summary-section {
      padding: 18px 24px;
      border-top: 1px solid #21262d;
      background: #0d1117;
    }

    .summary-section h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .summary-section p {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #c9d1d9;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4a9eff" stroke-width="2">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
  </svg>
  <h1>Domain Fingerprinting Tool</h1>
  <span class="badge">v1</span>
</header>

<div class="toolbar">
  <input id="domain-input" type="text" placeholder="example.com or https://example.com/path" />

  <div class="mode-toggle">
    <button id="btn-technical" class="active" onclick="setMode('technical')">Technical</button>
    <button id="btn-executive"              onclick="setMode('executive')">Executive</button>
  </div>

  <button class="scan-btn" id="scan-btn" onclick="startScan()">Scan</button>
</div>

<div class="status-bar" id="status-bar"></div>

<div class="workspace">
  <div id="graph-container">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2"/>
        <path d="m4.93 4.93 1.41 1.41m11.32 11.32 1.41 1.41M4.93 19.07l1.41-1.41m11.32-11.32 1.41-1.41"/>
      </svg>
      Enter a domain and click Scan
    </div>
  </div>

  <div class="side-panel" id="side-panel">
    <h3>Node Details</h3>
    <div id="node-detail-content"></div>
  </div>
</div>

<div class="summary-section" id="summary-section" style="display:none">
  <h2>AI Analysis</h2>
  <p id="summary-text"></p>
</div>

<script>
  let currentMode = "technical";

  function setMode(mode) {
    currentMode = mode;
    document.getElementById("btn-technical").classList.toggle("active", mode === "technical");
    document.getElementById("btn-executive").classList.toggle("active", mode === "executive");
  }

  function setStatus(type, message) {
    const bar = document.getElementById("status-bar");
    if (!message) { bar.innerHTML = ""; return; }
    bar.innerHTML = `<span class="dot ${type}"></span><span>${message}</span>`;
  }

  function showNodeDetail(node, riskScore) {
    const panel = document.getElementById("side-panel");
    const content = document.getElementById("node-detail-content");
    panel.classList.add("visible");

    const level = node.id === document.getElementById("domain-input").value.replace(/^https?:\/\//, "").split("/")[0].split("?")[0]
      ? riskLevelLabel(riskScore)
      : null;

    const meta = node.metadata && Object.keys(node.metadata).length
      ? Object.entries(node.metadata)
          .map(([k, v]) => `<tr><td>${k}</td><td>${JSON.stringify(v)}</td></tr>`)
          .join("")
      : "<tr><td colspan='2' style='color:#484f58'>No metadata</td></tr>";

    content.innerHTML = `
      <div class="node-id">${node.id}</div>
      <span class="node-type">${node.type}</span>
      ${level ? `<div style="margin-bottom:14px"><span class="risk-chip ${level.cls}">${level.label} risk · ${riskScore}/100</span></div>` : ""}
      <table class="meta-table"><tbody>${meta}</tbody></table>
    `;
  }

  function riskLevelLabel(score) {
    if (score >= 70) return { cls: "critical", label: "Critical" };
    if (score >= 40) return { cls: "medium",   label: "Medium" };
    return { cls: "low", label: "Low" };
  }

  async function startScan() {
    const domain = document.getElementById("domain-input").value.trim();
    if (!domain) return;

    const btn = document.getElementById("scan-btn");
    btn.disabled = true;
    setStatus("scanning", "Scanning — this may take 20–30 seconds…");
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("side-panel").classList.remove("visible");
    document.getElementById("summary-section").style.display = "none";

    try {
      const res = await fetch("/api/v1/scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ target: domain, mode: currentMode }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }

      const data = await res.json();
      const riskScore = data.scan.risk_score;
      const level = riskLevelLabel(riskScore);

      setStatus("done", `Scan complete — risk score <strong>${riskScore}/100</strong> &nbsp;<span class="risk-chip ${level.cls}" style="padding:1px 8px">${level.label}</span>`);

      renderGraph("graph-container", data, (node) => showNodeDetail(node, riskScore));

      if (data.summary) {
        document.getElementById("summary-text").textContent = data.summary;
        document.getElementById("summary-section").style.display = "block";
      }

    } catch (err) {
      setStatus("error", `Error: ${err.message}`);
      document.getElementById("empty-state").style.display = "flex";
    } finally {
      btn.disabled = false;
    }
  }

  // Allow Enter key to trigger scan
  document.getElementById("domain-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") startScan();
  });
</script>
</body>
</html>
